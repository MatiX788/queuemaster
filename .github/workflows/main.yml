name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Java JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Download Gradle 8.4
      run: |
        wget -q https://services.gradle.org/distributions/gradle-8.4-bin.zip
        unzip -q gradle-8.4-bin.zip
        echo "$PWD/gradle-8.4/bin" >> $GITHUB_PATH

    - name: Generate Gradle Wrapper
      working-directory: ./queuemaster/android-app
      run: |
        gradle wrapper --gradle-version 8.4
        chmod +x ./gradlew
        ls -la

    - name: Build Debug APK
      working-directory: ./queuemaster/android-app
      run: ./gradlew assembleDebug --no-daemon --stacktrace

    - name: Rename APK
      run: cp queuemaster/android-app/app/build/outputs/apk/debug/app-debug.apk QueueMaster.apk

    - name: Upload APK as artifact
      uses: actions/upload-artifact@v4
      with:
        name: QueueMaster-APK
        path: QueueMaster.apk
        retention-days: 90
